name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (core + FFI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - run: cargo fmt --check
      - run: cargo clippy -p lsmsg-core -p lsmsg-ffi -- -D warnings
      - run: cargo test -p lsmsg-core -p lsmsg-ffi

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    needs: rust
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests (pure-Python fallback)
        working-directory: sdks/python
        run: |
          uv run --with pytest --with pytest-asyncio --with httpx --with anyio \
            python -m pytest tests/ -q

      - name: Run microbenchmarks
        if: matrix.python-version == '3.11'
        working-directory: sdks/python
        run: |
          uv run --with pytest --with pytest-asyncio --with pytest-benchmark \
            python -m pytest benchmarks/ --benchmark-only --benchmark-enable \
            --benchmark-min-rounds=100 --benchmark-warmup=on \
            --benchmark-warmup-iterations=100

  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and test
        working-directory: sdks/typescript
        run: |
          npm ci
          npm test
          npm run bench

  go:
    name: Go SDK
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - uses: dtolnay/rust-toolchain@stable

      - name: Build Rust FFI library
        run: cargo build --release -p lsmsg-ffi

      - name: Run tests
        working-directory: sdks/go
        env:
          CGO_ENABLED: "1"
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
        run: go test -tags integration ./...

  build-py-native:
    name: Build Python native extension
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v6

      - run: pip install maturin
      - name: Build wheel
        working-directory: sdks/python
        run: maturin build --release -m ../../crates/lsmsg-py/Cargo.toml

  build-ts-native:
    name: Build TypeScript native extension
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install napi-cli and build
        working-directory: crates/lsmsg-napi
        run: |
          npm install -g @napi-rs/cli
          napi build --release
